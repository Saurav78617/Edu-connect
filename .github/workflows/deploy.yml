name: Deploy to AWS EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Get Github action IP
        id: ip
        run: echo "ipv4=$(curl -s https://api.ipify.org)" >> $GITHUB_OUTPUT

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Auto-Open Ports in AWS Security Group
        run: |
          # Allow SSH for Github Actions runner
          aws ec2 authorize-security-group-ingress --group-id ${{ secrets.AWS_SG_ID }} --protocol tcp --port 22 --cidr ${{ steps.ip.outputs.ipv4 }}/32 || true
          # Permanently allow public web traffic to the app on common ports
          aws ec2 authorize-security-group-ingress --group-id ${{ secrets.AWS_SG_ID }} --protocol tcp --port 80 --cidr 0.0.0.0/0 || true
          aws ec2 authorize-security-group-ingress --group-id ${{ secrets.AWS_SG_ID }} --protocol tcp --port 443 --cidr 0.0.0.0/0 || true
          aws ec2 authorize-security-group-ingress --group-id ${{ secrets.AWS_SG_ID }} --protocol tcp --port 3000 --cidr 0.0.0.0/0 || true
          aws ec2 authorize-security-group-ingress --group-id ${{ secrets.AWS_SG_ID }} --protocol tcp --port 5000 --cidr 0.0.0.0/0 || true

      - name: Deploy via SSH to EC2
        uses: appleboy/ssh-action@v1.0.3
        env:
          ENV_CONTENT: ${{ secrets.ENV_FILE_CONTENT }}
        with:
          host: 13.63.161.112
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: ENV_CONTENT
          script: |
            # Auto-Fix Ubuntu Internal Firewall
            sudo ufw allow 80/tcp
            sudo ufw allow 443/tcp
            sudo ufw allow 3000/tcp
            sudo ufw allow 5000/tcp
            
            cd /home/ubuntu/Edu-connect
            
            # Write .env file securely
            echo "$ENV_CONTENT" > .env
            
            git fetch origin main
            git reset --hard origin/main
            npm install
            npm run build
            export PATH=$PATH:/usr/local/bin:/home/ubuntu/.nvm/versions/node/v20*/bin:/home/ubuntu/.npm-global/bin
            npx pm2 restart educonnect || npx pm2 start "npm run start" --name educonnect
            npx pm2 logs educonnect --lines 100 --nostream > dist/pm2-logs.txt || true
            sudo systemctl reload nginx
            echo "✅ Deployment complete!"

      - name: Remove Github Actions IP from Security group
        if: always()
        run: |
          aws ec2 revoke-security-group-ingress --group-id ${{ secrets.AWS_SG_ID }} --protocol tcp --port 22 --cidr ${{ steps.ip.outputs.ipv4 }}/32
