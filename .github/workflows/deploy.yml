name: Deploy to AWS EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Get Github action IP
        id: ip
        run: echo "ipv4=$(curl -s https://api.ipify.org)" >> $GITHUB_OUTPUT

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Auto-Open Ports in AWS Security Group
        run: |
          SG_ID="${{ secrets.AWS_SG_ID }}"
          RUNNER_IP="${{ steps.ip.outputs.ipv4 }}/32"

          # Temporary SSH access for this runner
          aws ec2 authorize-security-group-ingress \
            --group-id "$SG_ID" \
            --protocol tcp \
            --port 22 \
            --cidr "$RUNNER_IP" || true

          # Ensure permanent public ports exist (idempotent)
          for PORT in 80 443 3000 5000; do
            aws ec2 authorize-security-group-ingress \
              --group-id "$SG_ID" \
              --protocol tcp \
              --port "$PORT" \
              --cidr 0.0.0.0/0 || true
          done
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Build and Package Application
        run: |
          npm install
          npm run build
          # Compress the required files for production to avoid sending unused files
          tar -czf deploy.tar.gz dist node_modules prisma server.ts package.json src

      - name: Copy Files to EC2
        uses: appleboy/scp-action@v0.1.4
        with:
          host: 13.63.161.112
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "deploy.tar.gz"
          target: "/home/ubuntu/Edu-connect/"

      - name: Deploy via SSH to EC2
        uses: appleboy/ssh-action@v1.0.3
        env:
          ENV_CONTENT: ${{ secrets.ENV_FILE_CONTENT }}
        with:
          host: 13.63.161.112
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: ENV_CONTENT
          script: |
            # Auto-Fix Ubuntu Internal Firewall
            sudo ufw allow 80/tcp
            sudo ufw allow 443/tcp
            sudo ufw allow 3000/tcp
            sudo ufw allow 5000/tcp
            
            cd /home/ubuntu/Edu-connect
            
            # Write .env file securely
            echo "$ENV_CONTENT" > .env
            
            # Extract the built application
            tar -xzf deploy.tar.gz
            rm deploy.tar.gz
            
            export PATH=$PATH:/usr/local/bin:/home/ubuntu/.nvm/versions/node/v20*/bin:/home/ubuntu/.npm-global/bin
            
            # Run Prisma DB Push just in case (fast, low memory)
            npx prisma generate
            npx prisma db push --accept-data-loss
            
            # Restart PM2
            npx pm2 restart educonnect --update-env || npx pm2 start "npm run start" --name educonnect
            npx pm2 logs educonnect --lines 100 --nostream > dist/pm2-logs.txt || true
            sudo systemctl reload nginx
            echo "✅ Deployment complete!"

      - name: Remove Github Actions IP from Security group
        if: always()
        run: |
          aws ec2 revoke-security-group-ingress --group-id ${{ secrets.AWS_SG_ID }} --protocol tcp --port 22 --cidr ${{ steps.ip.outputs.ipv4 }}/32
