version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: edu-connect-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: educonnect
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  edu-connect-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: edu-connect-prod
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      - db
    volumes:
      - edu-connect-data:/data
    restart: unless-stopped

volumes:
  edu-connect-data:
  postgres_data:
