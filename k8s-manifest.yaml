---
# ========================================
# Namespace
# ========================================
apiVersion: v1
kind: Namespace
metadata:
  name: educonnect
  labels:
    app: educonnect

---
# ========================================
# ConfigMap for Application Configuration
# ========================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: educonnect-config
  namespace: educonnect
data:
  NODE_ENV: 'production'
  PORT: '3000'
  DATABASE_URL: 'postgresql://educonnect:password@postgres-service:5432/educonnect'
  POSTGRES_DB: 'educonnect'
  POSTGRES_USER: 'educonnect'
  FRONTEND_URL: 'https://yourdomain.com'

---
# ========================================
# Secret for Sensitive Data
# ========================================
apiVersion: v1
kind: Secret
metadata:
  name: educonnect-secrets
  namespace: educonnect
type: Opaque
stringData:
  JWT_SECRET: 'your-super-secret-jwt-key-change-this'
  POSTGRES_PASSWORD: 'postgres-secure-password-change-this'
  EMAIL_USER: 'your-email@gmail.com'
  EMAIL_PASS: 'your-gmail-app-password'
  RAZORPAY_KEY_ID: 'your-razorpay-key'
  RAZORPAY_KEY_SECRET: 'your-razorpay-secret'
  GOOGLE_CLIENT_ID: 'your-google-client-id'
  GEMINI_API_KEY: 'your-gemini-api-key'

---
# ========================================
# PostgreSQL PersistentVolumeClaim
# ========================================
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: educonnect
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi

---
# ========================================
# PostgreSQL Deployment
# ========================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-deployment
  namespace: educonnect
  labels:
    app: postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
      - name: postgres
        image: postgres:16-alpine
        ports:
        - containerPort: 5432
          name: postgres
        env:
        - name: POSTGRES_DB
          valueFrom:
            configMapKeyRef:
              name: educonnect-config
              key: POSTGRES_DB
        - name: POSTGRES_USER
          valueFrom:
            configMapKeyRef:
              name: educonnect-config
              key: POSTGRES_USER
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: educonnect-secrets
              key: POSTGRES_PASSWORD
        volumeMounts:
        - name: postgres-storage
          mountPath: /var/lib/postgresql/data
          subPath: postgres
        livenessProbe:
          exec:
            command:
            - pg_isready
            - -U
            - educonnect
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          exec:
            command:
            - pg_isready
            - -U
            - educonnect
          initialDelaySeconds: 5
          periodSeconds: 5
        resources:
          requests:
            memory: '256Mi'
            cpu: '250m'
          limits:
            memory: '512Mi'
            cpu: '500m'
      volumes:
      - name: postgres-storage
        persistentVolumeClaim:
          claimName: postgres-pvc

---
# ========================================
# PostgreSQL Service
# ========================================
apiVersion: v1
kind: Service
metadata:
  name: postgres-service
  namespace: educonnect
  labels:
    app: postgres
spec:
  type: ClusterIP
  ports:
  - port: 5432
    targetPort: 5432
    protocol: TCP
    name: postgres
  selector:
    app: postgres

---
# ========================================
# EduConnect App Deployment
# ========================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: educonnect-deployment
  namespace: educonnect
  labels:
    app: educonnect
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: educonnect
  template:
    metadata:
      labels:
        app: educonnect
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
      - name: educonnect
        image: your-registry/educonnect:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3000
          name: http
          protocol: TCP
        env:
        - name: NODE_ENV
          valueFrom:
            configMapKeyRef:
              name: educonnect-config
              key: NODE_ENV
        - name: PORT
          valueFrom:
            configMapKeyRef:
              name: educonnect-config
              key: PORT
        - name: DATABASE_URL
          valueFrom:
            configMapKeyRef:
              name: educonnect-config
              key: DATABASE_URL
        - name: FRONTEND_URL
          valueFrom:
            configMapKeyRef:
              name: educonnect-config
              key: FRONTEND_URL
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: educonnect-secrets
              key: JWT_SECRET
        - name: EMAIL_USER
          valueFrom:
            secretKeyRef:
              name: educonnect-secrets
              key: EMAIL_USER
        - name: EMAIL_PASS
          valueFrom:
            secretKeyRef:
              name: educonnect-secrets
              key: EMAIL_PASS
        - name: RAZORPAY_KEY_ID
          valueFrom:
            secretKeyRef:
              name: educonnect-secrets
              key: RAZORPAY_KEY_ID
        - name: RAZORPAY_KEY_SECRET
          valueFrom:
            secretKeyRef:
              name: educonnect-secrets
              key: RAZORPAY_KEY_SECRET
        - name: GOOGLE_CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: educonnect-secrets
              key: GOOGLE_CLIENT_ID
        - name: GEMINI_API_KEY
          valueFrom:
            secretKeyRef:
              name: educonnect-secrets
              key: GEMINI_API_KEY
        livenessProbe:
          httpGet:
            path: /api/mentors
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /api/mentors
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 2
        resources:
          requests:
            memory: '512Mi'
            cpu: '500m'
          limits:
            memory: '1Gi'
            cpu: '1000m'
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          capabilities:
            drop:
            - ALL

---
# ========================================
# EduConnect Service (ClusterIP)
# ========================================
apiVersion: v1
kind: Service
metadata:
  name: educonnect-service
  namespace: educonnect
  labels:
    app: educonnect
spec:
  type: ClusterIP
  ports:
  - port: 3000
    targetPort: 3000
    protocol: TCP
    name: http
  selector:
    app: educonnect

---
# ========================================
# Ingress (External Access)
# ========================================
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: educonnect-ingress
  namespace: educonnect
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: 'true'
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - yourdomain.com
    - www.yourdomain.com
    secretName: educonnect-tls
  rules:
  - host: yourdomain.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: educonnect-service
            port:
              number: 3000
  - host: www.yourdomain.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: educonnect-service
            port:
              number: 3000

---
# ========================================
# Horizontal Pod Autoscaler
# ========================================
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: educonnect-hpa
  namespace: educonnect
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: educonnect-deployment
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
      - type: Percent
        value: 100
        periodSeconds: 30
      - type: Pods
        value: 2
        periodSeconds: 30
      selectPolicy: Max

---
# ========================================
# PodDisruptionBudget (High Availability)
# ========================================
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: educonnect-pdb
  namespace: educonnect
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: educonnect

---
# ========================================
# NetworkPolicy (Security)
# ========================================
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: educonnect-network-policy
  namespace: educonnect
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: ingress-nginx
  - from:
    - podSelector:
        matchLabels:
          app: educonnect
  egress:
  - to:
    - podSelector:
        matchLabels:
          app: postgres
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 53
    - protocol: UDP
      port: 53
