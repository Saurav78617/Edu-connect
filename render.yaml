services:
  - type: web
    name: edu-connect
    env: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    disk:
      name: sqlite-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DB_PATH
        value: /data/bridge.db
      - key: JWT_SECRET
        generateValue: true
