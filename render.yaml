services:
  - type: web
    name: edu-connect
    env: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DB_PATH
        value: /data/bridge.db
      - key: JWT_SECRET
        generateValue: true
      - key: GEMINI_API_KEY
        value: "" # Please fill this in the Render dashboard
    disk:
      name: data
      mountPath: /data
      sizeGB: 1
